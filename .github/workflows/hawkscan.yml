name: HawkScan

on:
  push:
  pull_request:

jobs:
  hawkscan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flask==3.1.3 graphql-core==3.2.6

      - name: Start vulnerable server
        run: |
          python server.py &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/health > /dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:8080/api/health || (echo "Server failed to start" && exit 1)

      - name: Verify endpoints
        run: |
          echo "=== REST ==="
          curl -s http://localhost:8080/api/users
          echo ""
          echo "=== OpenAPI ==="
          curl -s http://localhost:8080/openapi.yaml | head -5
          echo ""
          echo "=== GraphQL ==="
          curl -s -X POST http://localhost:8080/graphql \
            -H "Content-Type: application/json" \
            -d '{"query": "{ __schema { queryType { name } } }"}'
          echo ""

      - name: Run HawkScan
        uses: stackhawk/hawkscan-action@v2.2.0
        with:
          apiKey: ${{ secrets.HAWK_API_KEY }}
